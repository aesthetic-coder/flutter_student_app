name: student_productivity_app
description: A modern Flutter student productivity app with semester-based organization.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  get_storage: ^2.1.1
  intl: ^0.19.0
  table_calendar: ^3.0.9
  fl_chart: ^0.65.0
  smooth_page_indicator: ^1.1.0
  lottie: ^2.7.0
  uuid: ^4.0.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
